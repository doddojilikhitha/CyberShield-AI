version: '3.8'

services:
  backend:
    build:
      context: ./artifacts/api-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
    volumes:
      - backend-db:/app/db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: artifacts/cybershield/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
