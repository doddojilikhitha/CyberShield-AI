name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov fastapi uvicorn pydantic sqlalchemy langgraph langchain langchain-openai langchain-community langchain-core pypdf python-multipart python-dotenv openai httpx aiofiles scikit-learn numpy chromadb fpdf2
        
    - name: Run test suite with pytest
      run: |
        cd artifacts/api-server
        python -m pytest --cov=. tests/
