name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy
        
    - name: Run Black formatter check
      run: black --check artifacts/api-server/
      
    - name: Run Ruff Linter
      run: ruff check artifacts/api-server/
      
    - name: Run MyPy static analysis
      run: mypy --ignore-missing-imports artifacts/api-server/

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install --prefix artifacts/cybershield
        
    - name: Run TypeScript validation
      run: npm run typecheck --prefix artifacts/cybershield
