name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Build shared libraries and packages
      run: |
        # In a real environment, we'd install and run build for workspace packages.
        # This acts as the validation that esbuild and typechecks build.
        cd lib/api-zod && npm install --legacy-peer-deps
        cd ../db && npm install --legacy-peer-deps
        cd ../api-client-react && npm install --legacy-peer-deps
        cd ../../artifacts/cybershield && npm install --legacy-peer-deps
        npx tsc -b ../../lib/api-client-react
        cd ../api-server && npm install --legacy-peer-deps && npm run build
        cd ../cybershield && npm run build
