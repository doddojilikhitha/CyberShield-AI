services:
  # Backend Web Service
  - type: web
    name: cybershield-api
    env: python
    buildCommand: pip install -r artifacts/api-server/requirements.txt && pip install fpdf2
    startCommand: python artifacts/api-server/main.py
    envVars:
      - key: PORT
        value: 8080
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false

  # Frontend Static Site
  - type: web
    name: cybershield-app
    env: static
    buildCommand: npm install && npm run build
    publishDir: artifacts/cybershield/dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=31536000
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
